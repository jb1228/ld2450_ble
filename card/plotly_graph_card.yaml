# Source: https://community.home-assistant.io/t/screek-human-sensor-2a-ld2450-24ghz-mmwave-human-tracker-sensor/603070/41
# Requires: https://github.com/dbuezas/lovelace-plotly-graph-card

# Change the sensor_id to match your sensor

grid_options:
  columns: full
type: custom:plotly-graph
refresh_interval: 1
hours_to_show: current_day
config:
  modeBarButtonsToRemove:
    - select2d
    - lasso2d
    - toImage
  displaylogo: false
entities:
  - entity: ""
    fn_var1: $ex vars.sensor_id = "my_ld2450";
    fn_var2: $ex vars.sensor_name_prefix = "sensor." + vars.sensor_id + "_";
    fn_var3: $ex vars.number_name_prefix = "number." + vars.sensor_id + "_";
    fn_var4: >-
      $ex vars.is_inch_unit = hass.states[vars.sensor_name_prefix +
      "target_1_x"].attributes.unit_of_measurement == "in";
    fn_var5: >-
      $ex vars.device_id = hass.entities[vars.sensor_name_prefix +
      "target_1_x"].device_id;
    fn_var6: >-
      $ex vars.device_name = hass.devices[vars.device_id].name_by_user ||
      hass.devices[vars.device_id].name;
  - entity: ""
    name: Target 1
    marker:
      size: 10
      symbol: star-diamond
    line:
      shape: spline
      width: 5
    x:
      - >-
        $ex { var x = hass.states[vars.sensor_name_prefix + "target_1_x"].state;
        var y = hass.states[vars.sensor_name_prefix + "target_1_y"].state; if (x
        == 0 && y == 0) { return -9999 }; if (vars.is_inch_unit) { x = x * 25.4
        }; return x; }
    "y":
      - >-
        $ex { var x = hass.states[vars.sensor_name_prefix + "target_1_x"].state;
        var y = hass.states[vars.sensor_name_prefix + "target_1_y"].state; if (x
        == 0 && y == 0) { return -9999 }; if (vars.is_inch_unit) { y = y * 25.4
        }; return y; }
  - entity: ""
    name: Target 2
    marker:
      size: 10
      symbol: star-diamond
    line:
      shape: spline
      width: 5
    x:
      - >-
        $ex { var x = hass.states[vars.sensor_name_prefix + "target_2_x"].state;
        var y = hass.states[vars.sensor_name_prefix + "target_2_y"].state; if (x
        == 0 && y == 0) { return -9999 }; if (vars.is_inch_unit) { x = x * 25.4
        }; return x; }
    "y":
      - >-
        $ex { var x = hass.states[vars.sensor_name_prefix + "target_2_x"].state;
        var y = hass.states[vars.sensor_name_prefix + "target_2_y"].state; if (x
        == 0 && y == 0) { return -9999 }; if (vars.is_inch_unit) { y = y * 25.4
        }; return y; }
  - entity: ""
    internal: false
    name: Target 3
    marker:
      size: 10
      symbol: star-diamond
    line:
      shape: spline
      width: 5
    x:
      - >-
        $ex { var x = hass.states[vars.sensor_name_prefix + "target_3_x"].state;
        var y = hass.states[vars.sensor_name_prefix + "target_3_y"].state; if (x
        == 0 && y == 0) { return -9999 }; if (vars.is_inch_unit) { x = x * 25.4
        }; return x; }
    "y":
      - >-
        $ex { var x = hass.states[vars.sensor_name_prefix + "target_3_x"].state;
        var y = hass.states[vars.sensor_name_prefix + "target_3_y"].state; if (x
        == 0 && y == 0) { return -9999 }; if (vars.is_inch_unit) { y = y * 25.4
        }; return y; }
  - entity: ""
    name: Zone 1
    mode: lines
    fill: toself
    fillcolor: RGBA(20,200,0,0.06)
    line:
      color: RGBA(20,200,0,0.2)
      shape: line
      width: 2
    x:
      - $ex hass.states[vars.number_name_prefix + "zone_1_x1"].state
      - $ex hass.states[vars.number_name_prefix + "zone_1_x1"].state
      - $ex hass.states[vars.number_name_prefix + "zone_1_x2"].state
      - $ex hass.states[vars.number_name_prefix + "zone_1_x2"].state
      - $ex hass.states[vars.number_name_prefix + "zone_1_x1"].state
    "y":
      - $ex hass.states[vars.number_name_prefix + "zone_1_y1"].state
      - $ex hass.states[vars.number_name_prefix + "zone_1_y2"].state
      - $ex hass.states[vars.number_name_prefix + "zone_1_y2"].state
      - $ex hass.states[vars.number_name_prefix + "zone_1_y1"].state
      - $ex hass.states[vars.number_name_prefix + "zone_1_y1"].state
  - entity: ""
    name: Zone 2
    mode: lines
    fill: toself
    fillcolor: RGBA(200,0,255,0.06)
    line:
      color: RGBA(200,0,255,0.2)
      shape: line
      width: 2
    x:
      - $ex hass.states[vars.number_name_prefix + "zone_2_x1"].state
      - $ex hass.states[vars.number_name_prefix + "zone_2_x1"].state
      - $ex hass.states[vars.number_name_prefix + "zone_2_x2"].state
      - $ex hass.states[vars.number_name_prefix + "zone_2_x2"].state
      - $ex hass.states[vars.number_name_prefix + "zone_2_x1"].state
    "y":
      - $ex hass.states[vars.number_name_prefix + "zone_2_y1"].state
      - $ex hass.states[vars.number_name_prefix + "zone_2_y2"].state
      - $ex hass.states[vars.number_name_prefix + "zone_2_y2"].state
      - $ex hass.states[vars.number_name_prefix + "zone_2_y1"].state
      - $ex hass.states[vars.number_name_prefix + "zone_2_y1"].state
  - entity: ""
    name: Zone 3
    mode: lines
    fill: toself
    fillcolor: RGBA(200,120,55,0.06)
    line:
      color: RGBA(200,120,55,0.2)
      shape: line
      width: 2
    x:
      - $ex hass.states[vars.number_name_prefix + "zone_3_x1"].state
      - $ex hass.states[vars.number_name_prefix + "zone_3_x1"].state
      - $ex hass.states[vars.number_name_prefix + "zone_3_x2"].state
      - $ex hass.states[vars.number_name_prefix + "zone_3_x2"].state
      - $ex hass.states[vars.number_name_prefix + "zone_3_x1"].state
    "y":
      - $ex hass.states[vars.number_name_prefix + "zone_3_y1"].state
      - $ex hass.states[vars.number_name_prefix + "zone_3_y2"].state
      - $ex hass.states[vars.number_name_prefix + "zone_3_y2"].state
      - $ex hass.states[vars.number_name_prefix + "zone_3_y1"].state
      - $ex hass.states[vars.number_name_prefix + "zone_3_y1"].state
  - entity: ""
    name: Coverage
    mode: lines
    fill: tonexty
    fillcolor: rgba(168, 216, 234, 0.15)
    line:
      shape: line
      width: 1
      dash: dot
    x:
      - 0
      - $ex 8000 * Math.sin((2 * Math.PI)/360 * 60)
      - 5500
      - 4500
      - 4000
      - 3000
      - 2000
      - 1000
      - 0
      - -1000
      - -2000
      - -3000
      - -4000
      - -4500
      - -5500
      - $ex -8000 * Math.sin((2 * Math.PI)/360 * 60)
      - 0
    "y":
      - 0
      - $ex 8000 * Math.cos((2 * Math.PI)/360 * 60)
      - $ex Math.sqrt( 8000**2 - 5500**2 )
      - $ex Math.sqrt( 8000**2 - 4500**2 )
      - $ex Math.sqrt( 8000**2 - 4000**2 )
      - $ex Math.sqrt( 8000**2 - 3000**2 )
      - $ex Math.sqrt( 8000**2 - 2000**2 )
      - $ex Math.sqrt( 8000**2 - 1000**2 )
      - 8000
      - $ex Math.sqrt( 8000**2 - 1000**2 )
      - $ex Math.sqrt( 8000**2 - 2000**2 )
      - $ex Math.sqrt( 8000**2 - 3000**2 )
      - $ex Math.sqrt( 8000**2 - 4000**2 )
      - $ex Math.sqrt( 8000**2 - 4500**2 )
      - $ex Math.sqrt( 8000**2 - 5500**2 )
      - $ex 8000 * Math.cos((2 * Math.PI)/360 * 60)
      - 0
layout:
  paper_bgcolor: rgba(0,0,0,0)
  plot_bgcolor: rgba(0,0,0,0.4)
  height: 400
  margin:
    l: 40
    r: 20
    t: 20
    b: 55
  showlegend: true
  xaxis:
    showticklabels: true
    dtick: 1000
    gridcolor: RGBA(200,200,200,0.15)
    zerolinecolor: RGBA(200,200,200,0.15)
    type: number
    fixedrange: true
    range:
      - 5500
      - -5500
  yaxis:
    showticklabels: true
    dtick: 1000
    gridcolor: RGBA(200,200,200,0.15)
    zerolinecolor: RGBA(200,200,200,0.15)
    scaleanchor: x
    scaleratio: 1
    fixedrange: true
    range:
      - 8000
      - 0
  transition:
    duration: 900
    easing: quad-in-out
raw_plotly_config: true
title: $ex vars.device_name + ":\ mmWave Sensor Map"

